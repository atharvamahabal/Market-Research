name: market_research
description: "A paper-trading intraday market dashboard for Indian Stock Market (NSE)."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  
  # Navigation
  go_router: ^13.0.0
  
  # Networking
  dio: ^5.4.0
  
  # Local Database
  sqflite: ^2.3.0
  path: ^1.8.3
  
  # Authentication
  google_sign_in: ^6.1.6
  
  # Charts
  fl_chart: ^0.66.0
  
  # Utilities
  intl: ^0.19.0
  json_annotation: ^4.8.1
  freezed_annotation: ^2.4.1
  uuid: ^4.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  
  # Code Generation
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.3
  json_serializable: ^6.7.1
  freezed: ^2.4.6

flutter:
  uses-material-design: true
